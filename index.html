<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Neuro Mines</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="app">
        <div class="top-bar">
            <span id="lives" class="lives">❤️❤️❤️</span>
            <span id="timer" class="timer">01:00</span>
            <span id="score" class="score">0</span>
        </div>

        <div class="board-wrap">
            <canvas id="board"></canvas>
            <div id="hint" class="hint">点击任意格子开始</div>
        </div>

        <div id="overlay" class="overlay">
            <div class="overlay-content">
                <div id="overlayTitle" class="overlay-title"></div>
                <div class="overlay-score-label">得分</div>
                <div id="overlayScore" class="overlay-score"></div>
                <div id="overlayMsg" class="overlay-msg"></div>
                <button id="restartBtn" class="restart-btn">再来一局</button>
            </div>
        </div>
    </div>

    <script src="js/board.js"></script>
    <script src="js/renderer.js"></script>
    <script src="js/game.js"></script>
</body>
</html>
