<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Neuro Mines</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="app">
        <div class="top-bar">
            <span id="lives" class="lives">❤️❤️❤️</span>
            <span id="level" class="level">第1关</span>
            <span id="timer" class="timer">01:00</span>
            <span id="score" class="score">0</span>
        </div>

        <div class="board-wrap">
            <canvas id="board"></canvas>
            <div id="floats" class="floats"></div>
            <div id="hint" class="hint">点击任意格子开始</div>
        </div>

        <div class="bottom-bar">
            <div class="combo-wrap">
                <span id="comboText" class="combo-text"></span>
            </div>
            <button id="flagBtn" class="flag-btn" title="切换标旗模式">⛏️</button>
        </div>

        <div id="overlay" class="overlay">
            <div class="overlay-content">
                <div id="overlayTitle" class="overlay-title"></div>
                <div class="overlay-score-label">总得分</div>
                <div id="overlayScore" class="overlay-score"></div>
                <div id="overlayMsg" class="overlay-msg"></div>
                <div id="overlayRecord" class="overlay-record"></div>
                <div class="overlay-buttons">
                    <button id="nextBtn" class="btn-primary hidden">下一关 ⭐</button>
                    <button id="restartBtn" class="btn-secondary">重新开始</button>
                </div>
            </div>
        </div>
    </div>

    <script src="js/board.js"></script>
    <script src="js/renderer.js"></script>
    <script src="js/game.js"></script>
</body>
</html>
